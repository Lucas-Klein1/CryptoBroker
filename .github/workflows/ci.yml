name: CI for cryptosim

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: cryptosim

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check (compile all .py files)
        run: python -m compileall .

      - name: Run tests with coverage
        run: |
          pytest tests/ \
          --cov=services.market_service \
          --cov-report=html:coverage-html \
          --junit-xml=test-results.xml \
          -v

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: cryptosim/coverage-html/

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: cryptosim/test-results.xml

  ## Hier werden die Metriken ausgewertet für unsere Pipeline. Dokumentation unter docs/metrics/metriken_auswahl.md + docs/metrics/metriken_messwerte.md
  metrics:
    runs-on: ubuntu-latest
    needs: tests

    defaults:
      run:
        working-directory: cryptosim

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Zyklomatische Komplexitaet (radon cc)
        run: |
          echo "======================================================"
          echo "  METRIK 1: Zyklomatische Komplexitaet (McCabe)"
          echo "======================================================"
          radon cc . -a -s --exclude "tests/*"

      - name: Wartbarkeitsindex (radon mi)
        run: |
          echo "======================================================"
          echo "  METRIK 2: Wartbarkeitsindex (Maintainability Index)"
          echo "======================================================"
          radon mi . -s --exclude "tests/*"

      - name: Raw Metrics / LOC (radon raw)
        run: |
          echo "======================================================"
          echo "  METRIK 3: Raw Metrics (LOC & Kommentaranteil)"
          echo "======================================================"
          radon raw . -s --exclude "tests/*"


  build-test:
    runs-on: ubuntu-latest
    needs: tests

    defaults:
      run:
        working-directory: cryptosim

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image (test environment)
        run: docker build -t cryptosim-test .

      - name: Start container for smoke test
        run: |
          docker run -d --name cryptosim-test -p 5000:5000 cryptosim-test

      - name: Smoke test (container reachable)
        run: |
          for i in {1..30}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000 || true)
            if [ "$code" = "200" ] || [ "$code" = "403" ]; then
              echo "Startseite erreichbar: $code"
              exit 0
            fi
            echo "Warte auf Server... Versuch $i/30"
            sleep 1
          done
          echo "Server nicht erreichbar, Container-Logs:"
          docker logs cryptosim-test || true
          docker stop cryptosim-test || true
          exit 1

      - name: Stop and remove test container
        if: always()
        run: |
          docker stop cryptosim-test || true
          docker rm cryptosim-test || true
